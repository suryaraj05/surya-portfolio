services:
  - type: web
    name: suryaos-api
    runtime: python
    rootDir: backend
    buildCommand: pip install .
    startCommand: python scripts/start_production.py
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: API_V1_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://salvesuryaraj.vercel.app
      - key: REDIS_URL
        sync: false
